name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Format, lint, test, policy, and audit
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Rust toolchain
        run: rustup show
      - name: Install security tools
        run: |
          cargo install --locked cargo-deny --version 0.20.2
          cargo install --locked cargo-audit --version 0.22.2
          cargo install --locked cargo-sbom --version 0.10.0
      - name: Run repository checks
        run: scripts/checks.sh
      - name: Enforce Cargo policy
        run: cargo deny check
      - name: Check RustSec advisories
        run: cargo audit
      - name: Verify committed SBOM
        run: scripts/generate-sbom.sh --check

  rust-compatibility:
    name: Rust ${{ matrix.rust }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        rust:
          - 1.90.0
          - 1.91.0
          - 1.91.1
          - 1.92.0
          - 1.93.0
          - 1.93.1
          - 1.94.0
          - 1.94.1
          - 1.95.0
          - 1.96.0
          - 1.96.1
          - 1.97.0
          - 1.97.1
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install selected Rust
        run: rustup toolchain install ${{ matrix.rust }} --profile minimal
      - name: Check every feature
        run: cargo +${{ matrix.rust }} check --workspace --all-targets --all-features --locked

  host-platforms:
    name: ${{ matrix.os }} host
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Test workspace
        run: cargo test --workspace --all-features --locked

  portable-targets:
    name: Target ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-freebsd
          - aarch64-linux-android
          - aarch64-apple-ios
          - wasm32-unknown-unknown
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install target
        run: rustup target add ${{ matrix.target }}
      - name: Check dependency-free no_std workspace
        run: cargo check --workspace --target ${{ matrix.target }} --locked
