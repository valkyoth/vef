name: Bug report
description: Report a reproducible VEF bug.
title: "[bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include bytes, role, limits, state, and fragmentation if relevant.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security impact
      description: Do not include exploitable private details. Use SECURITY.md.
    validations:
      required: false
