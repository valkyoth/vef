# VEF admits no third-party Rust crates. This policy still fails closed if a
# dependency is proposed in the future.
[graph]
all-features = true

[licenses]
confidence-threshold = 0.95
include-dev = true
include-build = true
unused-allowed-license = "allow"
unused-license-exception = "deny"
allow = ["Apache-2.0", "Apache-2.0 WITH LLVM-exception", "MIT"]

[licenses.private]
ignore = true

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"

[advisories]
db-path = ".cargo-deny-advisory-dbs"
yanked = "deny"
unmaintained = "all"
unsound = "all"
unused-ignored-advisory = "deny"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
required-git-spec = "rev"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
